const myHeaders = new Headers();
myHeaders.append("Content-Type", "application/json");

// JSONPlaceholder uses '/posts' for POST and '/posts/1' for a specific GET
const postUrl = 'https://jsonplaceholder.typicode.com/posts';
const getUrl = 'https://jsonplaceholder.typicode.com/posts/1';

const options = {
    method: "POST",
    body: JSON.stringify({ username: "Krishna Chaitanya" }),
    headers: myHeaders,
};

async function getData() {
    const response = await fetch(postUrl);
    let data = await response.json();
    // Use a comma here so the browser logs the actual interactive object!
    console.log("get data response:", data);
}

async function postData() {
    // FIX 1 & 2: Passed 'options' directly and fixed the 'response' typo
    const response = await fetch(postUrl, options); 
    let data = await response.json();
    console.log("post data response:", data);
}

async function processData() {
    console.log("--- Starting Network Requests ---");
    await postData();
    await getData();
    console.log("--- All Requests Finished ---");
}

processData();
